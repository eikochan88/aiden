services:
  - type: web
    name: aiden-dashboard
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && pip install -r line-bot/requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: EIKO_LINE_USER_ID
        sync: false

  - type: web
    name: aiden-linebot
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r line-bot/requirements.txt
    startCommand: gunicorn --chdir line-bot main:app
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: EIKO_LINE_USER_ID
        sync: false
